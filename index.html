<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Teplota – Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #070d1a;
    --bg2:       #0c1525;
    --bg3:       #111e33;
    --border:    rgba(50,100,180,0.18);
    --text:      #c8daf5;
    --muted:     #3a5a80;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --blue:      #4a9eff;
    --teal:      #30d9a0;
    --amber:     #f5a623;
    --purple:    #9b7ff5;
    --red:       #ff5c5c;
    --green:     #30d9a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCANLINE EFFECT ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .layout {
    display: grid;
    grid-template-rows: 56px 1fr 44px;
    height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 22px; height: 22px;
    border: 1.5px solid var(--blue);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon::after {
    content: '';
    width: 8px; height: 8px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--blue);
  }
  .logo-text {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue);
  }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }
  .clock {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .date-txt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── MAIN GRID ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px 24px;
  }

  /* ── SENSOR CARD ── */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px 18px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.4s ease both;
    cursor: default;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(74,158,255,0.3); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, var(--blue));
  }

  /* subtle corner decoration */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 60px; height: 60px;
    border-top: 0.5px solid var(--border);
    border-left: 0.5px solid var(--border);
    border-radius: 14px 0 0 0;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-top: 2px;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(48,217,160,0.1);
    color: var(--teal);
    border: 0.5px solid rgba(48,217,160,0.25);
  }
  .status-badge.warn {
    background: rgba(245,166,35,0.1);
    color: var(--amber);
    border-color: rgba(245,166,35,0.25);
  }
  .status-badge.error {
    background: rgba(255,92,92,0.1);
    color: var(--red);
    border-color: rgba(255,92,92,0.25);
  }
  .status-badge.demo {
    background: rgba(155,127,245,0.1);
    color: var(--purple);
    border-color: rgba(155,127,245,0.25);
  }
  .status-badge.loading {
    background: rgba(74,158,255,0.1);
    color: var(--blue);
    border-color: rgba(74,158,255,0.25);
  }

  /* Temperature big display */
  .temp-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-top: 6px;
  }
  .temp-val {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 300;
    line-height: 1;
    transition: color 0.6s ease;
  }
  .temp-unit {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 300;
    color: var(--muted);
    align-self: flex-start;
    margin-top: 6px;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 12px 0 10px;
  }

  .metrics-row {
    display: flex;
    gap: 20px;
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .metric-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .metric-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
  }

  /* ── FOOTER ── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-top: 0.5px solid var(--border);
    background: var(--bg2);
  }

  .footer-left {
    display: flex; align-items: center; gap: 16px;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    animation: blink 2.5s ease-in-out infinite;
  }
  .live-dot.paused { background: var(--muted); animation: none; }
  .live-dot.error  { background: var(--red); animation: none; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  .status-txt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 16px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn:hover, .refresh-btn:active {
    color: var(--blue);
    border-color: rgba(74,158,255,0.4);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.19s; }
  .card:nth-child(4) { animation-delay: 0.26s; }

  /* ── SPINNER ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }

  /* ── NULL STATE ── */
  .null-val {
    color: var(--muted) !important;
    font-size: 40px !important;
  }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">Monitorovanie teploty</span>
    </div>
    <div class="header-right">
      <div style="text-align:right">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date-txt" id="dateTxt">—</div>
      </div>
    </div>
  </header>

  <main id="grid">
    <!-- karty sa vygenerujú dynamicky -->
  </main>

  <footer>
    <div class="footer-left">
      <div class="live-dot" id="liveDot"></div>
      <span class="status-txt" id="statusTxt">Načítavam…</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">↻ Obnoviť</button>
  </footer>

</div>

<script>
// ── KONFIGURÁCIA ──────────────────────────────────────────────────────────────
const REFRESH_MS   = 15000;   // interval automatického načítania (ms)
const API_SENSORS  = '/api/sensors';
const API_REFRESH  = '/api/refresh';

// Farby prízvuku pre každý slot (0–3)
const ACCENT_COLORS = ['#4a9eff', '#30d9a0', '#f5a623', '#9b7ff5'];

// ── POMOCNÉ FUNKCIE ───────────────────────────────────────────────────────────

function tempColor(t) {
  if (t === null || t === undefined) return 'var(--muted)';
  if (t < 10)  return '#4a9eff';   // studená modrá
  if (t < 18)  return '#a0c8ff';   // chladná
  if (t < 24)  return '#30d9a0';   // komfortná teal
  if (t < 28)  return '#f5a623';   // teplejšia oranžová
  return '#ff5c5c';                // horúca červená
}

function statusLabel(s) {
  return { ok: 'Online', warn: 'Upozornenie', error: 'Offline', demo: 'Demo', loading: '…' }[s] || s;
}

function fmt(v, decimals = 1) {
  return v !== null && v !== undefined ? v.toFixed(decimals) : '--';
}

function formatDate(d) {
  return d.toLocaleDateString('sk-SK', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('dateTxt').textContent = formatDate(now);
}
updateClock();
setInterval(updateClock, 1000);

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCards(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = data.map((s, i) => {
    const accent = ACCENT_COLORS[i % ACCENT_COLORS.length];
    const tc = tempColor(s.temp);
    const isNull = s.temp === null || s.temp === undefined;
    return `
      <div class="card" style="--accent: ${accent}">
        <div class="card-top">
          <div>
            <div class="card-label">Senzor ${i + 1}</div>
            <div class="card-name">${s.name}</div>
          </div>
          <span class="status-badge ${s.status}">${statusLabel(s.status)}</span>
        </div>

        <div class="temp-row">
          <span class="temp-val ${isNull ? 'null-val' : ''}" style="color: ${isNull ? '' : tc}">
            ${isNull ? '—·—' : fmt(s.temp)}
          </span>
          ${isNull ? '' : '<span class="temp-unit">°C</span>'}
        </div>

        <div class="divider"></div>

        <div class="metrics-row">
          <div class="metric">
            <span class="metric-label">Vlhkosť</span>
            <span class="metric-val">${s.humidity !== null && s.humidity !== undefined ? s.humidity + ' %' : '—'}</span>
          </div>
          <div class="metric">
            <span class="metric-label">Stav</span>
            <span class="metric-val">${s.status === 'ok' ? 'V poriadku' : s.status === 'demo' ? 'Demo dáta' : s.status === 'error' ? 'Chyba' : '—'}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function setStatus(msg, state = 'ok') {
  const dot = document.getElementById('liveDot');
  const txt = document.getElementById('statusTxt');
  txt.textContent = msg;
  dot.className = 'live-dot' + (state === 'error' ? ' error' : state === 'paused' ? ' paused' : '');
}

// ── NAČÍTANIE DÁT ─────────────────────────────────────────────────────────────
async function fetchData(endpoint = API_SENSORS) {
  try {
    const res = await fetch(endpoint, { method: endpoint === API_REFRESH ? 'POST' : 'GET' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    // API_REFRESH vracia { ok, data }, API_SENSORS vracia priamo pole
    return Array.isArray(json) ? json : json.data;
  } catch (e) {
    console.error('Fetch error:', e);
    return null;
  }
}

async function loadSensors(manual = false) {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span class="spin">↻</span> Načítavam…';
  btn.disabled = true;

  const data = await fetchData(manual ? API_REFRESH : API_SENSORS);

  btn.innerHTML = '↻ Obnoviť';
  btn.disabled = false;

  if (!data) {
    setStatus('Chyba spojenia so serverom', 'error');
    return;
  }

  renderCards(data);

  const now = new Date().toLocaleTimeString('sk-SK');
  const allOk = data.every(s => s.status === 'ok' || s.status === 'demo');
  const hasError = data.some(s => s.status === 'error');
  setStatus(
    `Posledná aktualizácia: ${now}`,
    hasError ? 'error' : 'ok'
  );
}

async function manualRefresh() {
  await loadSensors(true);
}

// ── ŠTART ────────────────────────────────────────────────────────────────────
// Zobraziť placeholder karty hneď
const placeholders = [
  { name: 'Obývačka', temp: null, humidity: null, status: 'loading' },
  { name: 'Spálňa',   temp: null, humidity: null, status: 'loading' },
  { name: 'Kuchyňa',  temp: null, humidity: null, status: 'loading' },
  { name: 'Garáž',    temp: null, humidity: null, status: 'loading' },
];
renderCards(placeholders);

loadSensors();
setInterval(() => loadSensors(false), REFRESH_MS);
</script>
</body>
</html>
